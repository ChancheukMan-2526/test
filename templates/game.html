<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鋤大Dee - 四人對戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* 載入畫面 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a472a 0%, #0a1a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-content {
            text-align: center;
            color: white;
        }
        
        .game-title {
            font-size: 64px;
            margin-bottom: 30px;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #f4c542 0%, #e6a817 100%);
            border: none;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            color: #1a1a2e;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 遊戲主畫面 */
        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: none;
        }
        
        /* 玩家位置 */
        .player {
            position: absolute;
            text-align: center;
            z-index: 10;
        }
        
        /* 玩家（下方）- 只保留手牌在底部中央 */
        .player-bottom {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
        }
        
        /* 玩家資訊面板 - 固定在左下角 */
        .player-info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 12px 20px;
            color: white;
            font-weight: bold;
            z-index: 15;
            backdrop-filter: blur(5px);
            border-left: 4px solid #f4c542;
            min-width: 150px;
        }
        
        .player-info-panel .player-name {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .player-info-panel .player-cards-count {
            font-size: 28px;
            color: #f4c542;
            font-weight: bold;
        }
        
        .player-info-panel .turn-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: gray;
            margin-left: 10px;
        }
        
        .player-info-panel .turn-indicator.active {
            background: #f4c542;
            box-shadow: 0 0 10px #f4c542;
            animation: pulse 1s infinite;
        }
        
        .player-top {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
        }
        
        .player-left {
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
        }
        
        .player-right {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
        }
        
        .player-info {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 10px 20px;
            display: inline-block;
            margin-bottom: 10px;
            color: white;
            font-weight: bold;
        }
        
        .player-name {
            font-size: 18px;
            white-space: nowrap;
        }
        
        .player-cards-count {
            font-size: 24px;
            color: #f4c542;
        }
        
        .turn-indicator-small {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: gray;
            display: inline-block;
            margin-left: 10px;
        }
        
        .turn-indicator-small.active {
            background: #f4c542;
            box-shadow: 0 0 10px #f4c542;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 手牌區域 */
        .hand-cards {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .card {
            width: 80px;
            height: 110px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card.selected {
            background: #90EE90;
            transform: translateY(-15px);
            box-shadow: 0 0 20px rgba(144, 238, 144, 0.8);
        }
        
        .card[data-suit="♥"], .card[data-suit="♦"] {
            color: #e74c3c;
        }
        
        .card[data-suit="♠"], .card[data-suit="♣"] {
            color: #2c3e50;
        }
        
        /* 對手的牌（背面） */
        .card-back {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 8px);
            position: relative;
        }
        
        .card-back::before {
            content: "?";
            font-size: 40px;
            color: rgba(255,255,255,0.3);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* 桌面中央 */
        .center-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
        }
        
        .last-cards-area {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            min-width: 300px;
            backdrop-filter: blur(10px);
        }
        
        .last-cards-title {
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .last-cards {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 120px;
        }
        
        .last-card {
            width: 70px;
            height: 100px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }
        
        .last-card[data-suit="♥"], .last-card[data-suit="♦"] {
            color: #e74c3c;
        }
        
        .last-card[data-suit="♠"], .last-card[data-suit="♣"] {
            color: #2c3e50;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* 控制按鈕 */
        .controls {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 20;
        }
        
        .control-btn {
            background: linear-gradient(135deg, #f4c542 0%, #e6a817 100%);
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease;
            color: #1a1a2e;
        }
        
        .control-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 訊息提示 - 移至底部，不擋中央 */
        .message-toast {
            position: fixed;
            bottom: 260px;
            left: 50%;
            transform: translate(-50%, 0);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 18px;
            z-index: 100;
            animation: fadeInOut 2s ease;
            pointer-events: none;
            white-space: nowrap;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
        
        /* 贏家畫面 */
        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            animation: fadeIn 0.5s ease;
        }
        
        .winner-content {
            text-align: center;
            color: white;
        }
        
        .winner-text {
            font-size: 48px;
            margin-bottom: 30px;
            color: #f4c542;
        }
        
        .play-again-btn {
            background: linear-gradient(135deg, #f4c542 0%, #e6a817 100%);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .card, .last-card {
                width: 55px;
                height: 75px;
                font-size: 20px;
            }
            .controls {
                bottom: 130px;
            }
            .player-left, .player-right {
                width: 120px;
            }
            .game-title {
                font-size: 40px;
            }
            .start-btn {
                padding: 10px 30px;
                font-size: 18px;
            }
            .message-toast {
                bottom: 210px;
                font-size: 14px;
                padding: 8px 20px;
                white-space: nowrap;
            }
            .player-name {
                font-size: 14px;
                white-space: normal;
                word-break: keep-all;
            }
            .player-info-panel {
                bottom: 10px;
                left: 10px;
                padding: 8px 15px;
                min-width: 120px;
            }
            .player-info-panel .player-name {
                font-size: 14px;
            }
            .player-info-panel .player-cards-count {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- 載入畫面 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="game-title">🃏 鋤大Dee 🃏</div>
            <div style="font-size: 18px; margin-bottom: 30px;">大老二 · 四人對戰</div>
            <button class="start-btn" onclick="startGame()">開始遊戲</button>
        </div>
    </div>
    
    <!-- 遊戲主畫面 -->
    <div class="game-container" id="gameContainer">
        <!-- 玩家資訊面板 - 固定在左下角 -->
        <div class="player-info-panel" id="playerInfoPanel">
            <div class="player-name">
                👤 玩家
                <span class="turn-indicator" id="turnIndicatorBottom"></span>
            </div>
            <div class="player-cards-count" id="playerCardsCount">13</div>
        </div>
        
        <!-- 上方玩家 (AI 1) -->
        <div class="player player-top">
            <div class="player-info">
                <span class="player-name" id="topPlayerName">🤖 AI 1</span>
                <span class="turn-indicator-small" id="turnTop"></span>
                <div class="player-cards-count" id="topCardsCount">13</div>
            </div>
            <div class="hand-cards" id="topHand"></div>
        </div>
        
        <!-- 左方玩家 (AI 2) -->
        <div class="player player-left">
            <div class="player-info">
                <span class="player-name" id="leftPlayerName">🤖 AI 2</span>
                <span class="turn-indicator-small" id="turnLeft"></span>
                <div class="player-cards-count" id="leftCardsCount">13</div>
            </div>
            <div class="hand-cards" id="leftHand"></div>
        </div>
        
        <!-- 右方玩家 (AI 3) -->
        <div class="player player-right">
            <div class="player-info">
                <span class="player-name" id="rightPlayerName">🤖 AI 3</span>
                <span class="turn-indicator-small" id="turnRight"></span>
                <div class="player-cards-count" id="rightCardsCount">13</div>
            </div>
            <div class="hand-cards" id="rightHand"></div>
        </div>
        
        <!-- 下方玩家手牌區域 (只顯示手牌，不顯示玩家資訊) -->
        <div class="player player-bottom">
            <div class="hand-cards" id="bottomHand"></div>
        </div>
        
        <!-- 桌面中央 -->
        <div class="center-area">
            <div class="last-cards-area">
                <div class="last-cards-title">📌 上一手牌</div>
                <div class="last-cards" id="lastCardsArea">
                    <div style="color: rgba(255,255,255,0.5);">等待出牌</div>
                </div>
            </div>
        </div>
        
        <!-- 控制按鈕 -->
        <div class="controls">
            <button class="control-btn" id="playBtn" onclick="playCards()">🎯 出牌</button>
            <button class="control-btn" id="passBtn" onclick="passTurn()">⏭️ Pass</button>
        </div>
    </div>
    
    <script>
        let selectedIndices = new Set();
        let myTurn = false;
        let isLoading = false;
        let gameActive = false;
        let stateInterval = null;
        
        const playerPositions = ['bottom', 'top', 'left', 'right'];
        
        // 更新AI玩家名稱 (根據後端傳回的隨機名稱)
        function updateAINames(aiNames) {
            if (!aiNames || aiNames.length < 3) return;
            // 順序: top -> left -> right 對應 aiNames 索引 0,1,2
            const topNameElem = document.getElementById('topPlayerName');
            const leftNameElem = document.getElementById('leftPlayerName');
            const rightNameElem = document.getElementById('rightPlayerName');
            if (topNameElem) topNameElem.innerHTML = `🤖 ${aiNames[0]}`;
            if (leftNameElem) leftNameElem.innerHTML = `🤖 ${aiNames[1]}`;
            if (rightNameElem) rightNameElem.innerHTML = `🤖 ${aiNames[2]}`;
        }
        
        async function startGame() {
            console.log("開始遊戲按鈕被點擊");
            try {
                const response = await fetch('/start_game', { method: 'POST' });
                const data = await response.json();
                console.log("開始遊戲回應:", data);
                if (data.success) {
                    // 先更新一次AI名稱（確保載入畫面結束後立即顯示）
                    if (data.ai_names) updateAINames(data.ai_names);
                    
                    const loadingScreen = document.getElementById('loadingScreen');
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        document.getElementById('gameContainer').style.display = 'block';
                        gameActive = true;
                        fetchGameState();
                        // 設置定時器定期更新狀態
                        if (stateInterval) clearInterval(stateInterval);
                        stateInterval = setInterval(() => {
                            if (gameActive && !myTurn) {
                                fetchGameState();
                            }
                        }, 2000);
                    }, 500);
                } else {
                    alert('開始遊戲失敗，請重試');
                }
            } catch (error) {
                console.error('開始遊戲失敗:', error);
                alert('開始遊戲失敗，請檢查伺服器是否正常執行');
            }
        }
        
        async function fetchGameState() {
            if (!gameActive || isLoading) return;
            isLoading = true;
            
            try {
                const response = await fetch('/state');
                const data = await response.json();
                console.log("遊戲狀態:", data);
                
                // 更新AI隨機名稱（每次狀態刷新時同步，確保新遊戲顯示正確）
                if (data.ai_names) {
                    updateAINames(data.ai_names);
                }
                
                if (data.game_over) {
                    showWinner(data.winner);
                    isLoading = false;
                    return;
                }
                
                // 更新每位玩家的牌數
                if (data.cards_count) {
                    updateCardsCount(data.cards_count);
                }
                
                // 更新回合指示器
                updateTurnIndicator(data.current_player);
                myTurn = (data.current_player === 0);
                
                // 更新玩家手牌
                if (data.hands && data.hands[0]) {
                    renderPlayerHand(data.hands[0]);
                    // 更新左下角面板的牌數
                    const playerCardsCountElem = document.getElementById('playerCardsCount');
                    if (playerCardsCountElem) {
                        playerCardsCountElem.innerHTML = data.hands[0].length;
                    }
                }
                
                // 更新桌面中央的牌
                if (data.last_cards && data.last_cards.length > 0) {
                    renderLastCards(data.last_cards);
                } else {
                    const lastCardsArea = document.getElementById('lastCardsArea');
                    lastCardsArea.innerHTML = '<div style="color: rgba(255,255,255,0.5);">新一輪</div>';
                }
                
                // 渲染對手手牌（背面）
                renderOpponentHands(data.hands);
                
                // AI 自動移動
                if (!myTurn && !data.game_over) {
                    setTimeout(() => aiMove(), 500);
                }
                
            } catch (error) {
                console.error('獲取狀態失敗:', error);
            } finally {
                isLoading = false;
            }
        }
        
        function updateCardsCount(counts) {
            document.getElementById('topCardsCount').innerHTML = counts[1] || 13;
            document.getElementById('leftCardsCount').innerHTML = counts[2] || 13;
            document.getElementById('rightCardsCount').innerHTML = counts[3] || 13;
        }
        
        function updateTurnIndicator(currentPlayer) {
            // 更新左下角面板的回合指示器
            const bottomIndicator = document.getElementById('turnIndicatorBottom');
            if (bottomIndicator) {
                if (currentPlayer === 0) {
                    bottomIndicator.classList.add('active');
                } else {
                    bottomIndicator.classList.remove('active');
                }
            }
            
            // 更新對手的小指示器
            const indicators = {
                top: document.getElementById('turnTop'),
                left: document.getElementById('turnLeft'),
                right: document.getElementById('turnRight')
            };
            
            Object.values(indicators).forEach(ind => {
                if (ind) ind.classList.remove('active');
            });
            
            if (currentPlayer === 1 && indicators.top) {
                indicators.top.classList.add('active');
            } else if (currentPlayer === 2 && indicators.left) {
                indicators.left.classList.add('active');
            } else if (currentPlayer === 3 && indicators.right) {
                indicators.right.classList.add('active');
            }
        }
        
        function renderPlayerHand(hand) {
            const container = document.getElementById('bottomHand');
            if (!container) return;
            container.innerHTML = '';
            selectedIndices.clear();
            
            hand.forEach((card, index) => {
                const suit = card[0];
                const rank = card.slice(1);
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.setAttribute('data-suit', suit);
                cardDiv.innerHTML = `${suit}${rank}`;
                cardDiv.onclick = (e) => {
                    e.stopPropagation();
                    toggleCard(index);
                };
                container.appendChild(cardDiv);
            });
        }
        
        function renderOpponentHands(hands) {
            const positions = ['topHand', 'leftHand', 'rightHand'];
            for (let i = 0; i < positions.length; i++) {
                const container = document.getElementById(positions[i]);
                if (!container) continue;
                container.innerHTML = '';
                const cardCount = hands[i + 1] ? hands[i + 1].length : 13;
                const displayCount = Math.min(cardCount, 8);
                for (let j = 0; j < displayCount; j++) {
                    const cardBack = document.createElement('div');
                    cardBack.className = 'card card-back';
                    container.appendChild(cardBack);
                }
                if (cardCount > 8) {
                    const more = document.createElement('div');
                    more.className = 'card';
                    more.style.background = 'rgba(0,0,0,0.5)';
                    more.style.color = 'white';
                    more.style.fontSize = '20px';
                    more.innerHTML = `+${cardCount - 8}`;
                    container.appendChild(more);
                }
            }
        }
        
        function renderLastCards(cards) {
            const container = document.getElementById('lastCardsArea');
            container.innerHTML = '';
            cards.forEach(card => {
                const suit = card[0];
                const rank = card.slice(1);
                const cardDiv = document.createElement('div');
                cardDiv.className = 'last-card';
                cardDiv.setAttribute('data-suit', suit);
                cardDiv.innerHTML = `${suit}${rank}`;
                if (suit === '♥' || suit === '♦') {
                    cardDiv.style.color = '#e74c3c';
                } else {
                    cardDiv.style.color = '#2c3e50';
                }
                container.appendChild(cardDiv);
            });
        }
        
        function toggleCard(index) {
            if (!myTurn) {
                showMessage('等待你的回合');
                return;
            }
            
            if (selectedIndices.has(index)) {
                selectedIndices.delete(index);
            } else {
                selectedIndices.add(index);
            }
            
            const cards = document.querySelectorAll('#bottomHand .card');
            cards.forEach((card, i) => {
                if (selectedIndices.has(i)) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }
        
        async function playCards() {
            if (!myTurn) {
                showMessage('等待你的回合');
                return;
            }
            
            if (selectedIndices.size === 0) {
                showMessage('請先選擇要出的牌');
                return;
            }
            
            const indices = Array.from(selectedIndices);
            console.log("出牌索引:", indices);
            
            try {
                const response = await fetch('/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ indices: indices })
                });
                const data = await response.json();
                console.log("出牌回應:", data);
                
                if (data.success) {
                    if (data.game_over) {
                        showWinner(data.winner);
                    } else {
                        showMessage('出牌成功！');
                        selectedIndices.clear();
                        await fetchGameState();
                    }
                } else {
                    showMessage(data.message || '出牌失敗');
                }
            } catch (error) {
                console.error('出牌失敗:', error);
                showMessage('出牌失敗，請重試');
            }
        }
        
        async function passTurn() {
            if (!myTurn) {
                showMessage('等待你的回合');
                return;
            }
            
            try {
                const response = await fetch('/pass');
                const data = await response.json();
                console.log("Pass回應:", data);
                
                if (data.success) {
                    showMessage('Pass');
                    await fetchGameState();
                } else {
                    showMessage(data.message || 'Pass失敗');
                }
            } catch (error) {
                console.error('Pass失敗:', error);
                showMessage('Pass失敗，請重試');
            }
        }
        
        async function aiMove() {
            if (myTurn || !gameActive) return;
            
            try {
                const response = await fetch('/ai');
                const data = await response.json();
                console.log("AI回應:", data);
                
                if (data.success) {
                    if (data.action === 'win') {
                        showWinner(data.winner);
                    } else if (data.action === 'play') {
                        const aiDisplayName = data.ai_name || 'AI';
                        showMessage(`${aiDisplayName} 出了 ${data.cards.length} 張牌`);
                        await fetchGameState();
                    } else if (data.action === 'pass') {
                        const aiDisplayName = data.ai_name || 'AI';
                        showMessage(`${aiDisplayName} Pass`);
                        await fetchGameState();
                    }
                } else if (data.game_over) {
                    showWinner(data.winner);
                }
            } catch (error) {
                console.error('AI移動失敗:', error);
            }
        }
        
        // 訊息提示 - 位置已透過CSS調整至底部
        function showMessage(msg) {
            const toast = document.createElement('div');
            toast.className = 'message-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
        
        function showWinner(winner) {
            gameActive = false;
            if (stateInterval) clearInterval(stateInterval);
            
            const overlay = document.createElement('div');
            overlay.className = 'winner-overlay';
            overlay.innerHTML = `
                <div class="winner-content">
                    <div class="winner-text">🏆 ${winner} 獲勝！ 🏆</div>
                    <button class="play-again-btn" onclick="location.reload()">🔄 再玩一局</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }
        
        function resetGame() {
            window.location.href = '/reset';
        }
        
        // 頁面加載時檢查是否有遊戲進行中
        window.onload = function() {
            console.log("頁面加載完成");
        };
    </script>
</body>
</html>
